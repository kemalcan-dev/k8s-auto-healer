global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'namespace']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  receiver: auto-healer-webhook

  routes:
    # Critical alerts → heal immediately + notify Slack
    - match:
        severity: critical
      receiver: auto-healer-webhook
      continue: true

    - match:
        severity: critical
      receiver: slack-critical

    # Warning alerts → heal only
    - match:
        severity: warning
      receiver: auto-healer-webhook

receivers:
  - name: auto-healer-webhook
    webhook_configs:
      - url: "http://auto-healer-svc:8080/webhook"
        send_resolved: false
        http_config:
          bearer_token: "${HEALER_BEARER_TOKEN}"

  - name: slack-critical
    slack_configs:
      - channel: "#sre-alerts"
        title: "🚨 {{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Namespace:* {{ .Labels.namespace }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'namespace']
